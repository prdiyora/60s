<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shanti — Devotional Timer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<main>

  <!-- Background music -->
  <audio id="bgMusic" src="rr1.mp3" loop preload="auto" playsinline></audio>

  <header>
    <h1>સીતારામ</h1>
  </header>

  <section>

    <div class="duration-selector">
      <label>Timer Duration (seconds):</label>
      <input type="number" value="5">
    </div>

    <div class="timer">00:05</div>

    <div class="subtext">
      Focus on a prayer or breath. The timer will restart automatically.
    </div>

    <!-- ✅ FIXED INFINITE SCROLL -->
   <div class="scrolling-mantra-container">
  <div class="scroll-track">

    <div class="scrolling-mantra">
      <span class="mantra-text">સીતારામ</span>
      <span class="mantra-text">સીતારામ</span>
      <span class="mantra-text">સીતારામ</span>
      <span class="mantra-text">સીતારામ</span>
    </div>

    <!-- duplicate -->
    <div class="scrolling-mantra">
      <span class="mantra-text">સીતારામ</span>
      <span class="mantra-text">સીતારામ</span>
      <span class="mantra-text">સીતારામ</span>
      <span class="mantra-text">સીતારામ</span>
    </div>

  </div>
</div>

  </section>

  <footer>
    <p>Breathe. Pray. Chant — સીતારામ</p>
  </footer>

</main>

</body>
</html>
